<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>ECOZEN 18 – QUAY & TRÚNG QUÀ 100%</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="wheel-wrapper">

  <!-- MŨI TÊN -->
  <div class="arrow"></div>

  <!-- VÒNG QUAY -->
  <canvas id="wheel" width="700" height="700"></canvas>

  <!-- NHẬP CODE -->
  <div class="code-box">

    <input
      type="text"
      id="spinCode"
      placeholder="Nhập mã quay"
    />

  </div>

  <!-- NÚT QUAY -->
  <button id="spinBtn" class="spin-btn">
    QUAY
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
